<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop Gift Box</title>
    <style>
        #gift-box {
            width: 400px;
            height: 200px;
            border: 2px dashed #ccc;
            position: relative;
            margin: 20px 0;
        }
        .product {
            width: 150px;
            height: 100px;
            border: 1px solid #000;
            margin: 10px;
            display: inline-block;
            text-align: center;
            line-height: 100px;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <h1>Drag and Drop Gift Box</h1>
    <div id="gift-box">Drop Here</div>
    <div class="product" draggable="true">Product 1</div>
    <div class="product" draggable="true">Product 2</div>
    <div class="product" draggable="true">Product 3</div>

    <script>
        const products = document.querySelectorAll('.product');
        const giftBox = document.getElementById('gift-box');

        products.forEach(product => {
            product.addEventListener('dragstart', () => {
                product.classList.add('dragging');
            });

            product.addEventListener('dragend', () => {
                product.classList.remove('dragging');
            });
        });

        giftBox.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        giftBox.addEventListener('drop', (e) => {
            e.preventDefault();
            const draggingProduct = document.querySelector('.product.dragging');
            giftBox.appendChild(draggingProduct);
        });
    </script>
</body>
</html>
