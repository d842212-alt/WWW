<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Box</title>
    <style>
        .gift-box {
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
            margin: 20px;
            padding: 10px;
            position: relative;
        }
        .product {
            width: 80px;
            height: 80px;
            border: 1px solid #000;
            margin: 10px;
            cursor: pointer;
            display: inline-block;
            text-align: center;
            line-height: 80px;
        }
    </style>
</head>
<body>
    <h1>Drag and Drop Gift Box</h1>
    <div class="product" draggable="true">Product 1</div>
    <div class="product" draggable="true">Product 2</div>
    <div class="product" draggable="true">Product 3</div>
    <div class="gift-box" id="giftBox">Drop here</div>

    <script>
        const products = document.querySelectorAll('.product');
        const giftBox = document.getElementById('giftBox');

        products.forEach(product => {
            product.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', e.target.textContent);
            });
        });

        giftBox.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        giftBox.addEventListener('drop', (e) => {
            e.preventDefault();
            const productName = e.dataTransfer.getData('text/plain');
            const newProduct = document.createElement('div');
            newProduct.textContent = productName;
            newProduct.className = 'product';
            giftBox.appendChild(newProduct);
        });
    </script>
</body>
</html>
