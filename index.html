<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Shaped Gift Box Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .left-grid {
            width: 60%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .right-grid {
            width: 35%;
            position: relative;
        }
        .item {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .overlapping-item {
            position: absolute;
            width: 45%;
            background-color: #ffcccc;
        }
        .top-item {
            top: 0;
            left: 0;
        }
        .bottom-item {
            bottom: 0;
            left: 0;
        }
        button {
            margin: 20px 0;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="left-grid">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
    </div>
    <div class="right-grid">
        <div class="overlapping-item top-item">Item A</div>
        <div class="overlapping-item bottom-item">Item B</div>
    </div>
    <div>
        <button id="clearButton">Clear All</button>
    </div>
    
    <script>
        document.getElementById('clearButton').addEventListener('click', function() {
            alert('All items cleared!');
            // Code to clear items could go here
        });
    </script>
</body>
</html>
