<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮物盒模擬器</title>
    <style>
        #grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px;
        }
        .item {
            border: 1px solid #ccc;
            padding: 20px;
            text-align: center;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <h1>禮物盒模擬器</h1>
    <div id="grid">
        <div class="item">鳳梨貓掌酥</div>
        <div class="item">蔓越莓貓掌酥</div>
        <div class="item">鐵觀音抹茶貓掌酥</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
    <button id="clear-all">🗑️ 一鍵清除</button>
    <script>
        document.getElementById('clear-all').onclick = function() {
            const items = document.querySelectorAll('.item');
            items.forEach((item) => {
                item.innerHTML = '';
            });
        };
    </script>
</body>
</html>
