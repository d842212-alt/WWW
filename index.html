<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Shaped Gift Box Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            justify-content: space-between;
        }
        .left-boxes, .right-boxes {
            margin: 20px;
        }
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid #000;
            display: inline-block;
            margin: 5px;
            vertical-align: top;
        }
        .product-menu {
            margin-top: 20px;
        }
        .clear-button {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-boxes">
        <h3>Left Boxes (3x2 Grid)</h3>
        <div class="box" onclick="selectBox(this)"></div>
        <div class="box" onclick="selectBox(this)"></div>
        <div class="box" onclick="selectBox(this)"></div>
        <div class="box" onclick="selectBox(this)"></div>
        <div class="box" onclick="selectBox(this)"></div>
        <div class="box" onclick="selectBox(this)"></div>
    </div>

    <div class="right-boxes">
        <h3>Right Boxes (4 Overlapping)</h3>
        <div class="box" onclick="selectBox(this)" style="position: absolute; z-index: 1;"></div>
        <div class="box" onclick="selectBox(this)" style="position: absolute; top: 50px; z-index: 1;"></div>
        <div class="box" onclick="selectBox(this)" style="position: absolute; top: 100px; z-index: 1;"></div>
        <div class="box" onclick="selectBox(this)" style="position: absolute; top: 150px; z-index: 1;"></div>
    </div>
</div>

<div class="product-menu">
    <h3>Product Menu</h3>
    <button onclick="selectProduct('鳳梨貓掌酥')">鳳梨貓掌酥</button>
    <button onclick="selectProduct('蔓越莓貓掌酥')">蔓越莓貓掌酥</button>
    <button onclick="selectProduct('鐵觀音貓掌酥')">鐵觀音貓掌酥</button>
    <button class="clear-button" onclick="clearAll()">Clear All</button>
</div>

<script>
    let selectedProduct = '';
    
    function selectProduct(product) {
        selectedProduct = product;
        alert(product + ' selected!');
    }

    function selectBox(box) {
        if (selectedProduct) {
            box.innerText = selectedProduct;
            box.style.backgroundColor = '#e0e0e0'; // Optional: change box color to indicate selection
        } else {
            alert('Please select a product first.');
        }
    }

    function clearAll() {
        const boxes = document.querySelectorAll('.box');
        boxes.forEach(box => {
            box.innerText = '';
            box.style.backgroundColor = '';
        });
        selectedProduct = '';
        alert('All boxes cleared!');
    }
</script>

</body>
</html>
