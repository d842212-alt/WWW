<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Box Layout</title>
    <style>
        .container {
            display: flex;
        }
        .left-side {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            width: 50%;
        }
        .right-side {
            position: relative;
            width: 50%;
        }
        .overlapping-item {
            position: absolute;
        }
        .top-right-item {
            top: 10px;
            right: 10px;
        }
        .bottom-right-item {
            bottom: 10px;
            right: 10px;
        }
        .button {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="left-side">
            <div>鳳梨貓掌酥</div>
            <div>蔓越莓貓掌酥</div>
            <div>鐵觀音貓掌酥</div>
            <div>鳳梨貓掌酥</div>
            <div>蔓越莓貓掌酥</div>
            <div>鐵觀音貓掌酥</div>
        </div>
        <div class="right-side">
            <div class="overlapping-item top-right-item">
                <div>Top Right Item 1</div>
                <div>Top Right Item 2</div>
            </div>
            <div class="overlapping-item bottom-right-item">
                <div>Bottom Right Item 1</div>
                <div>Bottom Right Item 2</div>
            </div>
        </div>
    </div>

    <button class="button">Clear All</button>
    
</body>
</html>
